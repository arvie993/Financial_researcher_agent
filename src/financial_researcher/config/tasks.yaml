# src/research_crew/config/tasks.yaml
research_task:
  description: >
    Today's date is {current_date}. Conduct thorough research on company {company}
    using the MOST CURRENT information available. Focus on:
    1. Current company status and financial health in {current_year}
    2. Recent stock performance and market cap in {current_year}
    3. Major challenges and opportunities facing the company RIGHT NOW
    4. Latest news and events from {current_year}
    5. Future outlook and analyst predictions

    IMPORTANT: When using the search tool, ALWAYS include "{current_year}" in your
    search queries (e.g. "{company} revenue {current_year}", "{company} latest news {current_year}").
    Do NOT rely on outdated information. All data should be as recent as possible.
  expected_output: >
    A comprehensive research document with data from {current_year} covering
    all the requested aspects of {company}. Include specific facts, figures,
    and dates. Every section should reference {current_year} data where available.
  agent: researcher

analysis_task:
  description: >
    Today's date is {current_date}. Analyze the research findings and create a
    comprehensive report on {company}. Your report should:
    1. Begin with an executive summary reflecting {current_year} status
    2. Include all key information from the research, prioritizing {current_year} data
    3. Provide insightful analysis of trends and patterns
    4. Offer a market outlook for the company, noting that this should not be used for trading decisions
    5. Be formatted in a professional, easy-to-read style with clear headings

    If any data appears to be from prior years, note that clearly and distinguish it
    from current {current_year} data.
  expected_output: >
    A polished, professional report on {company} as of {current_date} that presents
    the research findings with added analysis and insights. The report should be
    well-structured with an executive summary, main sections, and conclusion.
    All data should reflect {current_year} wherever possible.
  agent: analyst
  context:
    - research_task
  output_file: output/report.md
